name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Compile (esbuild)
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Test (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mighty-max-${{ matrix.os }}-${{ github.sha }}
          path: mighty-max.vsix
          if-no-files-found: warn
